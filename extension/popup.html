<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 248px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #e5eef9;
      background: #0b1220;
      padding: 14px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }
    .header img { width: 24px; height: 24px; }
    .header h1 { font-size: 18px; font-weight: 700; flex: 1; }
    .header .version-tag {
      font-size: 12px;
      color: #8fa2c2;
      font-variant-numeric: tabular-nums;
    }
    .status-card {
      display: flex;
      align-items: center;
      gap: 12px;
      min-height: 92px;
      padding: 18px 16px;
      border: 1px solid #1d2b45;
      border-radius: 18px;
      background: linear-gradient(180deg, #111a2d 0%, #0d1526 100%);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04);
    }
    .status-copy {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      flex-shrink: 0;
      box-shadow: 0 0 0 6px rgba(255, 255, 255, 0.04);
    }
    .dot.connected { background: #37e39c; box-shadow: 0 0 0 6px rgba(55, 227, 156, 0.14); }
    .dot.disconnected { background: #ff6b6b; box-shadow: 0 0 0 6px rgba(255, 107, 107, 0.14); }
    .dot.connecting { background: #ffb020; box-shadow: 0 0 0 6px rgba(255, 176, 32, 0.14); }
    .status-text {
      font-size: 16px;
      font-weight: 700;
      color: #f7fbff;
    }
    .status-subtitle {
      font-size: 12px;
      line-height: 1.4;
      color: #8fa2c2;
    }
  </style>
</head>
<body>
  <div class="header">
    <img src="icons/icon-48.png" alt="WebCLI">
    <h1>WebCLI</h1>
    <span class="version-tag" id="extVersion"></span>
  </div>
  <div class="status-card" id="card">
    <span class="dot connecting" id="dot"></span>
    <div class="status-copy">
      <div class="status-text" id="status">检查连接状态...</div>
      <div class="status-subtitle" id="statusSubtitle">等待 bridge server 响应</div>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
